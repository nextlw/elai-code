components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque
      description: |
        Token gerado em `~/.elai/server-token` (ou `--token-file`).
        Validado por SHA-256 contra o token persistido.

  parameters:
    SessionId:
      in: path
      name: id
      required: true
      schema: { type: string }
      description: ID da sessão.
    SessionPathId:
      in: path
      name: session_id
      required: true
      schema: { type: string }
      description: ID da sessão.

  responses:
    BadRequest:
      description: Requisição inválida
      content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
    Unauthorized:
      description: Token ausente/ inválido
      content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
    Forbidden:
      description: "Acesso negado (ex.: path traversal)"
      content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
    NotFound:
      description: Recurso não encontrado
      content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
    Conflict:
      description: "Conflito de estado (ex.: turn já em execução)"
      content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
    Unprocessable:
      description: Não foi possível processar
      content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
    InternalError:
      description: Erro interno
      content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }

  schemas:
    Error:
      type: object
      properties:
        error: { type: string }
      required: [error]

    Health:
      type: object
      properties:
        ok: { type: boolean }
        version: { type: string }
      required: [ok, version]

    Version:
      type: object
      properties:
        ok: { type: boolean }
        version: { type: string }
        name: { type: string }
      required: [ok, version, name]

    PermissionMode:
      type: string
      description: Modo de permissão da sessão.
      enum: [read-only, workspace-write, danger-full-access, prompt, allow]

    SessionSummary:
      type: object
      properties:
        id: { type: string }
        cwd: { type: string }
        created_at: { type: integer, format: int64 }
        model: { type: string }
        permission_mode: { $ref: "#/components/schemas/PermissionMode" }
        title: { type: string, nullable: true }
        message_count: { type: integer, nullable: true }
      required: [id, cwd, created_at, model, permission_mode]

    CreateSessionRequest:
      type: object
      properties:
        cwd: { type: string, description: "Diretório de trabalho. Default: cwd do servidor." }
        model: { type: string }
        permission_mode: { $ref: "#/components/schemas/PermissionMode" }

    CreateSessionResponse:
      type: object
      properties:
        session_id: { type: string }
        session: { $ref: "#/components/schemas/SessionSummary" }
      required: [session_id, session]

    SessionsList:
      type: object
      properties:
        sessions:
          type: array
          items: { $ref: "#/components/schemas/SessionSummary" }
      required: [sessions]

    MessageBlock:
      type: object
      properties:
        type: { type: string, description: "ex.: text, code, tool_use, tool_result, thinking" }
        text: { type: string, nullable: true }
        language: { type: string, nullable: true }
      required: [type]

    Message:
      type: object
      properties:
        role: { type: string, enum: [system, user, assistant, tool] }
        blocks:
          type: array
          items: { $ref: "#/components/schemas/MessageBlock" }
      required: [role, blocks]

    SessionDetail:
      type: object
      properties:
        session: { $ref: "#/components/schemas/SessionSummary" }
        messages:
          type: array
          items: { $ref: "#/components/schemas/Message" }
      required: [session, messages]

    PatchSessionRequest:
      type: object
      properties:
        model: { type: string }
        permission_mode: { $ref: "#/components/schemas/PermissionMode" }

    SendMessageRequest:
      type: object
      properties:
        content: { type: string }
      required: [content]

    TurnAccepted:
      type: object
      properties:
        turn_id: { type: string }
      required: [turn_id]

    SessionCost:
      type: object
      properties:
        total_tokens: { type: integer }
        input_tokens: { type: integer }
        output_tokens: { type: integer }
        estimated_usd: { type: number, format: double }
      required: [total_tokens, input_tokens, output_tokens, estimated_usd]

    PendingPermission:
      type: object
      properties:
        request_id: { type: string }
        tool_name: { type: string }
        input: { type: string, description: "JSON serializado dos argumentos" }
        required_mode: { type: string }
      required: [request_id, tool_name, input, required_mode]

    PendingPermissions:
      type: object
      properties:
        pending:
          type: array
          items: { $ref: "#/components/schemas/PendingPermission" }
      required: [pending]

    DecidePermissionRequest:
      type: object
      properties:
        outcome: { type: string, enum: [allow, deny] }
        reason: { type: string, nullable: true }
      required: [outcome]

    CompactResult:
      type: object
      properties:
        status: { type: string, example: ok }
        removed_message_count: { type: integer }
      required: [status, removed_message_count]

    ExportSessionJson:
      type: object
      properties:
        id: { type: string }
        cwd: { type: string }
        model: { type: string }
        permission_mode: { type: string }
        markdown: { type: string, nullable: true }
        messages:
          type: array
          nullable: true
          items: { $ref: "#/components/schemas/Message" }

    StatusResponse:
      type: object
      properties:
        status: { type: string }
        message: { type: string, nullable: true }
        session_id: { type: string, nullable: true }
      required: [status]

    # Workspace
    WsReadRequest:
      type: object
      properties:
        path: { type: string }
        offset: { type: integer, format: int64 }
        limit: { type: integer, format: int64 }
      required: [path]

    WsReadResponse:
      type: object
      properties:
        path: { type: string }
        content: { type: string }
        is_binary: { type: boolean, nullable: true }
        offset: { type: integer, nullable: true }
        limit: { type: integer, nullable: true }
        total_size: { type: integer, nullable: true }
      required: [path, content]

    WsWriteRequest:
      type: object
      properties:
        path: { type: string }
        content: { type: string }
      required: [path, content]

    WsWriteResponse:
      type: object
      properties:
        path: { type: string }
        bytes_written: { type: integer }
      required: [path, bytes_written]

    WsEditRequest:
      type: object
      properties:
        path: { type: string }
        old_string: { type: string }
        new_string: { type: string }
        replace_all: { type: boolean, default: false }
      required: [path, old_string, new_string]

    WsEditResponse:
      type: object
      properties:
        path: { type: string }
        replacements: { type: integer, nullable: true }
        replaced_count: { type: integer, nullable: true }
        content: { type: string, nullable: true }
      required: [path]

    WsGlobRequest:
      type: object
      properties:
        pattern: { type: string }
      required: [pattern]

    WsGlobResponse:
      type: object
      properties:
        matches:
          type: array
          items: { type: string }
        count: { type: integer, nullable: true }
      required: [matches]

    WsGrepRequest:
      type: object
      properties:
        pattern: { type: string }
        path: { type: string, nullable: true }
        case_insensitive: { type: boolean, default: false }
      required: [pattern]

    GrepMatch:
      type: object
      properties:
        file: { type: string, nullable: true }
        path: { type: string, nullable: true }
        line: { type: integer, nullable: true }
        line_number: { type: integer, nullable: true }
        column: { type: integer, nullable: true }
        text: { type: string, nullable: true }

    WsGrepResponse:
      type: object
      properties:
        matches:
          type: array
          items: { $ref: "#/components/schemas/GrepMatch" }
        count: { type: integer, nullable: true }
      required: [matches]

    TreeEntry:
      type: object
      properties:
        path: { type: string }
        kind: { type: string, enum: [file, dir] }
        depth: { type: integer }
      required: [path, kind, depth]

    WsTreeResponse:
      type: object
      properties:
        cwd: { type: string }
        entries:
          type: array
          items: { $ref: "#/components/schemas/TreeEntry" }
      required: [cwd, entries]

    WsDiffResponse:
      type: object
      properties:
        diff: { type: string }
      required: [diff]

    # Git
    GitOutput:
      type: object
      properties:
        output: { type: string, nullable: true }
        error: { type: string, nullable: true }

    GitCommitRequest:
      type: object
      properties:
        message: { type: string }
        files:
          type: array
          items: { type: string }
      required: [message]

    GitBranchCreateRequest:
      type: object
      properties:
        name: { type: string }
        from: { type: string, nullable: true }
      required: [name]

    GitWorktreeCreateRequest:
      type: object
      properties:
        path: { type: string }
        branch: { type: string }
      required: [path, branch]

    GitPrCreateRequest:
      type: object
      properties:
        title: { type: string }
        body: { type: string, nullable: true }
        base: { type: string, nullable: true }
      required: [title]

    # Config
    Model:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        max_tokens: { type: integer, nullable: true }
        supports_thinking: { type: boolean }
        supports_vision: { type: boolean }
      required: [id, name, supports_thinking, supports_vision]

    ModelsList:
      type: object
      properties:
        models:
          type: array
          items: { $ref: "#/components/schemas/Model" }
      required: [models]

    Provider:
      type: object
      properties:
        id: { type: string }
        available: { type: boolean }
        description: { type: string }
      required: [id, available, description]

    ProvidersList:
      type: object
      properties:
        providers:
          type: array
          items: { $ref: "#/components/schemas/Provider" }
      required: [providers]

    GlobalConfig:
      type: object
      properties:
        setup_complete: { type: boolean }
        default_model: { type: string }
        default_permission_mode: { type: string }
        locale: { type: string }
        theme: { $ref: "#/components/schemas/Theme" }

    Config:
      type: object
      properties:
        global: { $ref: "#/components/schemas/GlobalConfig" }
        runtime: { type: object, additionalProperties: true }

    PatchConfig:
      type: object
      properties:
        setup_complete: { type: boolean }
        default_model: { type: string }
        default_permission_mode: { type: string }
        locale: { type: string }

    ConfigSource:
      type: object
      properties:
        source: { type: string }
        path: { type: string }
        exists: { type: boolean }

    ConfigSources:
      type: object
      properties:
        sources:
          type: array
          items: { $ref: "#/components/schemas/ConfigSource" }

    ProviderTestResult:
      type: object
      properties:
        provider: { type: string }
        status: { type: string, enum: [ok, error] }
        message: { type: string }

    Budget:
      type: object
      properties:
        monthly_limit: { type: number, format: double, nullable: true }
        soft_limit: { type: number, format: double, nullable: true }
        tracking_period: { type: string, nullable: true }

    Theme:
      type: object
      properties:
        primary_color: { type: string, nullable: true }
        accent_color: { type: string, nullable: true }
        dark_mode: { type: boolean, nullable: true }

    # Commands
    Command:
      type: object
      properties:
        name: { type: string }
        summary: { type: string }
        category: { type: string }
        argument_hint: { type: string, nullable: true }
      required: [name, summary, category]

    CommandsList:
      type: object
      properties:
        commands:
          type: array
          items: { $ref: "#/components/schemas/Command" }

    RunCommandRequest:
      type: object
      properties:
        name: { type: string }
        args: { type: string, nullable: true }
      required: [name]

    CommandOutput:
      type: object
      properties:
        output: { type: string, nullable: true }
        status: { type: string, nullable: true }

    ResumeRequest:
      type: object
      properties:
        session: { type: object, additionalProperties: true, nullable: true }

    # Tools
    Tool:
      type: object
      properties:
        name: { type: string }
        description: { type: string, nullable: true }
        input_schema: { type: object, additionalProperties: true }
      required: [name]

    ToolsList:
      type: object
      properties:
        tools:
          type: array
          items: { $ref: "#/components/schemas/Tool" }

    ToolDetail:
      $ref: "#/components/schemas/Tool"

    PatternsRequest:
      type: object
      properties:
        patterns:
          type: array
          items: { type: string }
      required: [patterns]

    AllowResult:
      type: object
      properties:
        status: { type: string }
        allow_patterns:
          type: array
          items: { type: string }

    DenyResult:
      type: object
      properties:
        status: { type: string }
        deny_patterns:
          type: array
          items: { type: string }

    RateLimitRejection:
      type: object
      properties:
        tool_id: { type: string }
        reason: { type: string }

    RateLimitStatus:
      type: object
      properties:
        rejected_count: { type: integer }
        rejected:
          type: array
          items: { $ref: "#/components/schemas/RateLimitRejection" }

    # Tasks
    Task:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        status: { type: string }
        created_at: { type: integer, format: int64 }
      required: [id, name, status, created_at]

    TasksList:
      type: object
      properties:
        tasks:
          type: array
          items: { $ref: "#/components/schemas/Task" }

    # Cache & Telemetry
    CacheStats:
      type: object
      properties:
        total_entries: { type: integer }
        total_hits: { type: integer }
        oldest_entry_ms: { type: integer, format: int64, nullable: true }
        newest_entry_ms: { type: integer, format: int64, nullable: true }

    TelemetryEntry:
      type: object
      properties:
        timestamp: { type: integer, format: int64 }
        event: { type: string }
        data: { type: object, additionalProperties: true }

    TelemetryList:
      type: object
      properties:
        telemetry:
          type: array
          items: { $ref: "#/components/schemas/TelemetryEntry" }

    UsageSummary:
      type: object
      properties:
        total_input_tokens: { type: integer }
        total_output_tokens: { type: integer }
        total_cache_write_tokens: { type: integer }
        total_cache_read_tokens: { type: integer }
        total_cost_usd: { type: number, format: double }
        request_count: { type: integer }

    # Auth
    AuthProviderStatus:
      type: object
      properties:
        provider: { type: string }
        authenticated: { type: boolean }
        method: { type: string, nullable: true }
        expires_at: { type: integer, format: int64, nullable: true }

    AuthStatus:
      type: object
      properties:
        providers:
          type: array
          items: { $ref: "#/components/schemas/AuthProviderStatus" }

    AuthMethodEntry:
      type: object
      properties:
        provider: { type: string }
        methods:
          type: array
          items: { type: string }

    AuthMethodsList:
      type: object
      properties:
        providers:
          type: array
          items: { $ref: "#/components/schemas/AuthMethodEntry" }

    SetApiKeyRequest:
      type: object
      properties:
        provider: { type: string }
        key: { type: string }
      required: [provider, key]

    ProviderRequest:
      type: object
      properties:
        provider: { type: string }
      required: [provider]

    ProviderStatus:
      type: object
      properties:
        status: { type: string }
        provider: { type: string }

    OAuthStart:
      type: object
      properties:
        authorization_url: { type: string, format: uri }
        state: { type: string }

    ImportResult:
      type: object
      properties:
        status: { type: string }
        imported: { type: boolean }

    # MCP
    McpServer:
      type: object
      properties:
        name: { type: string }
        transport: { type: string }
        status: { type: string }

    McpServersList:
      type: object
      properties:
        servers:
          type: array
          items: { $ref: "#/components/schemas/McpServer" }

    McpAddServerRequest:
      type: object
      properties:
        name: { type: string }
        transport: { type: string }
        config: { type: object, additionalProperties: true }
      required: [name, transport]

    McpUpdateServerRequest:
      type: object
      properties:
        config: { type: object, additionalProperties: true }

    McpToolItem:
      type: object
      properties:
        name: { type: string }

    McpToolsList:
      type: object
      properties:
        tools:
          type: array
          items: { $ref: "#/components/schemas/McpToolItem" }

    McpResourceItem:
      type: object
      properties:
        uri: { type: string }

    McpResourcesList:
      type: object
      properties:
        resources:
          type: array
          items: { $ref: "#/components/schemas/McpResourceItem" }

    McpCallToolRequest:
      type: object
      properties:
        arguments: { type: object, additionalProperties: true }

    McpCallToolResponse:
      type: object
      properties:
        status: { type: string }
        result: { type: object, additionalProperties: true, nullable: true }

    # Plugins / Skills / Agents / Hooks
    PluginItem:
      type: object
      properties:
        name: { type: string }
        enabled: { type: boolean }

    PluginsList:
      type: object
      properties:
        plugins:
          type: array
          items: { $ref: "#/components/schemas/PluginItem" }

    SkillItem:
      type: object
      properties:
        name: { type: string }
        description: { type: string, nullable: true }

    SkillsList:
      type: object
      properties:
        skills:
          type: array
          items: { $ref: "#/components/schemas/SkillItem" }

    SkillsValidation:
      type: object
      properties:
        valid: { type: boolean }
        errors:
          type: array
          items: { type: string }

    AgentItem:
      type: object
      properties:
        name: { type: string }

    AgentsList:
      type: object
      properties:
        agents:
          type: array
          items: { $ref: "#/components/schemas/AgentItem" }

    HookEntry:
      type: object
      properties:
        event: { type: string }
        commands:
          type: array
          items: { type: string }

    HooksList:
      type: object
      properties:
        hooks:
          type: array
          items: { $ref: "#/components/schemas/HookEntry" }

    # User Commands
    UserCommandItem:
      type: object
      properties:
        name: { type: string }
        description: { type: string }
        scope: { type: string }

    UserCommandsList:
      type: object
      properties:
        commands:
          type: array
          items: { $ref: "#/components/schemas/UserCommandItem" }

    UserCommandUpsert:
      type: object
      properties:
        name: { type: string }
        content: { type: string }
      required: [name, content]

    UserCommandContent:
      type: object
      properties:
        content: { type: string }
      required: [content]
