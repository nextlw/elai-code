openapi: 3.1.0
info:
  title: elai-server HTTP API
  version: "1.0.0"
  summary: API REST do elai-server (Axum) para sessões de IA, workspace, ferramentas, MCP, plugins e telemetria.
  description: |
    `elai-server` é um servidor HTTP (Rust + Axum) que expõe orquestração de sessões de IA,
    operações de workspace (read/write/edit/glob/grep), Git, ferramentas (tools), provedores LLM,
    autenticação (API key/OAuth), MCP, plugins/skills/agents, telemetria e cache.

    ## Autenticação
    Todos os endpoints (exceto `GET /v1/health`) exigem **Bearer token** no header
    `Authorization: Bearer <token>`. O token é gerado/persistido pelo binário `elai-server`
    em `~/.elai/server-token` (ou no caminho informado por `--token-file`).

    ## Streaming
    - **SSE** (`text/event-stream`): `GET /v1/sessions/{id}/events`
    - **WebSocket**: `GET /v1/sessions/{id}/permissions/ws`

    ## Convenções de Erro
    Erros retornam JSON `{ "error": "<mensagem>" }` com códigos HTTP padrão (400, 401, 403, 404, 409, 422, 500, 501).
  contact:
    name: elai-code
    url: https://github.com/willy3087/elai-code
  license:
    name: Proprietary
servers:
  - url: http://127.0.0.1:8456
    description: Loopback local (default)
  - url: http://{host}:{port}
    description: Servidor customizado
    variables:
      host:
        default: 127.0.0.1
      port:
        default: "8456"

security:
  - bearerAuth: []

tags:
  - name: Health
    description: Saúde e versão do servidor.
  - name: Sessions
    description: CRUD de sessões, mensagens, eventos SSE e permissões.
  - name: Workspace
    description: Operações de arquivo (read/write/edit/glob/grep/tree/diff) escopadas à sessão.
  - name: Git
    description: Comandos Git executados no `cwd` da sessão.
  - name: Config
    description: Modelos, provedores, configuração global, budget e tema.
  - name: Commands
    description: Slash-commands listáveis e executáveis por sessão.
  - name: Tools
    description: Ferramentas disponíveis para o LLM e seu controle por sessão.
  - name: Tasks
    description: Tarefas em segundo plano (run/cancel/output).
  - name: Telemetry
    description: Telemetria, uso e cache.
  - name: Auth
    description: Status, API keys, OAuth e import de credenciais.
  - name: MCP
    description: Servidores MCP (Model Context Protocol).
  - name: Plugins
    description: Plugins, skills, agents e hooks.
  - name: UserCommands
    description: Slash-commands customizadas pelo usuário.

paths:
  # ===================== HEALTH =====================
  /v1/health:
    get:
      tags: [Health]
      summary: Healthcheck público
      operationId: health
      security: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"

  /v1/version:
    get:
      tags: [Health]
      summary: Versão do servidor
      operationId: version
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Version"
        "401": { $ref: "#/components/responses/Unauthorized" }

  # ===================== SESSIONS =====================
  /v1/sessions:
    post:
      tags: [Sessions]
      summary: Criar sessão
      operationId: createSession
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateSessionRequest" }
      responses:
        "201":
          description: Sessão criada
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CreateSessionResponse" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    get:
      tags: [Sessions]
      summary: Listar sessões
      operationId: listSessions
      responses:
        "200":
          description: Sessões
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SessionsList" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /v1/sessions/{id}:
    parameters:
      - $ref: "#/components/parameters/SessionId"
    get:
      tags: [Sessions]
      summary: Obter sessão + mensagens
      operationId: getSession
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SessionDetail" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [Sessions]
      summary: Apagar sessão
      operationId: deleteSession
      responses:
        "204": { description: Sem conteúdo }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [Sessions]
      summary: Atualizar modelo / permission_mode
      operationId: patchSession
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PatchSessionRequest" }
      responses:
        "200":
          description: Sessão atualizada
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SessionSummary" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/sessions/{id}/messages:
    parameters:
      - $ref: "#/components/parameters/SessionId"
    post:
      tags: [Sessions]
      summary: Enviar mensagem (assíncrono → turn_id)
      description: |
        Aceita uma mensagem do usuário e dispara um *turn* assíncrono.
        Para acompanhar a resposta em tempo real, conecte-se a
        `GET /v1/sessions/{id}/events` (SSE).
      operationId: sendMessage
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SendMessageRequest" }
      responses:
        "202":
          description: Turn enfileirado
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TurnAccepted" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }

  /v1/sessions/{id}/turns/{turn_id}/cancel:
    parameters:
      - $ref: "#/components/parameters/SessionId"
      - in: path
        name: turn_id
        required: true
        schema: { type: string }
    post:
      tags: [Sessions]
      summary: Cancelar turn em execução
      operationId: cancelTurn
      responses:
        "204": { description: Cancelado }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/sessions/{id}/events:
    parameters:
      - $ref: "#/components/parameters/SessionId"
    get:
      tags: [Sessions]
      summary: Stream SSE de eventos da sessão
      description: |
        Stream `text/event-stream`. Eventos típicos: `snapshot`, `text_delta`,
        `thinking_delta`, `tool_use_started`, `tool_use_input_delta`,
        `message_appended`, `tool_result`, `usage_delta`, `turn_completed`,
        `turn_cancelled`, `turn_error`, `permission_request`.
      operationId: streamEvents
      parameters:
        - in: query
          name: since
          schema: { type: integer, minimum: 0 }
          description: Sequência inicial para retomar o stream.
      responses:
        "200":
          description: Stream SSE
          content:
            text/event-stream:
              schema: { type: string, description: "linhas SSE: 'event:' + 'data:'" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/sessions/{id}/cost:
    parameters:
      - $ref: "#/components/parameters/SessionId"
    get:
      tags: [Sessions]
      summary: Custo agregado da sessão
      operationId: getSessionCost
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SessionCost" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/sessions/{id}/permissions/pending:
    parameters:
      - $ref: "#/components/parameters/SessionId"
    get:
      tags: [Sessions]
      summary: Permissões pendentes
      operationId: listPendingPermissions
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PendingPermissions" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/permissions/{request_id}/decide:
    parameters:
      - in: path
        name: request_id
        required: true
        schema: { type: string }
    post:
      tags: [Sessions]
      summary: Decidir permissão pendente
      operationId: decidePermission
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DecidePermissionRequest" }
      responses:
        "204": { description: Decisão registrada }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/sessions/{id}/permissions/ws:
    parameters:
      - $ref: "#/components/parameters/SessionId"
    get:
      tags: [Sessions]
      summary: WebSocket para fluxo de permissões
      description: |
        Faz upgrade para WebSocket. O servidor envia `PermissionRequest`;
        o cliente responde com `{request_id, outcome: "allow"|"deny", reason?}`
        ou `{ "type": "ping" }` para keepalive.
      operationId: permissionsWs
      responses:
        "101": { description: Switching Protocols }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/sessions/{id}/clone:
    parameters:
      - $ref: "#/components/parameters/SessionId"
    post:
      tags: [Sessions]
      summary: Clonar sessão (com histórico)
      operationId: cloneSession
      responses:
        "201":
          description: Sessão clonada
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CreateSessionResponse" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/sessions/{id}/compact:
    parameters:
      - $ref: "#/components/parameters/SessionId"
    post:
      tags: [Sessions]
      summary: Compactar histórico da sessão
      operationId: compactSessionDirect
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CompactResult" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/sessions/{id}/export:
    parameters:
      - $ref: "#/components/parameters/SessionId"
    post:
      tags: [Sessions]
      summary: Exportar sessão (json|md)
      operationId: exportSessionDirect
      parameters:
        - in: query
          name: format
          schema:
            type: string
            enum: [json, md]
            default: json
      responses:
        "200":
          description: Conteúdo exportado
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ExportSessionJson" }
            text/markdown:
              schema: { type: string }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/sessions/{id}/resume:
    parameters:
      - $ref: "#/components/parameters/SessionId"
    post:
      tags: [Sessions]
      summary: Retomar sessão
      operationId: resumeSessionDirect
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StatusResponse" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  # ===================== WORKSPACE =====================
  /v1/workspace/{session_id}/read:
    parameters:
      - $ref: "#/components/parameters/SessionPathId"
    post:
      tags: [Workspace]
      summary: Ler arquivo
      operationId: workspaceRead
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/WsReadRequest" } } }
      responses:
        "200":
          description: OK
          content: { application/json: { schema: { $ref: "#/components/schemas/WsReadResponse" } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/Unprocessable" }

  /v1/workspace/{session_id}/write:
    parameters: [{ $ref: "#/components/parameters/SessionPathId" }]
    post:
      tags: [Workspace]
      summary: Escrever arquivo
      operationId: workspaceWrite
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/WsWriteRequest" } } }
      responses:
        "200":
          description: OK
          content: { application/json: { schema: { $ref: "#/components/schemas/WsWriteResponse" } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/Unprocessable" }

  /v1/workspace/{session_id}/edit:
    parameters: [{ $ref: "#/components/parameters/SessionPathId" }]
    post:
      tags: [Workspace]
      summary: Edição por substituição (old_string→new_string)
      operationId: workspaceEdit
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/WsEditRequest" } } }
      responses:
        "200":
          description: OK
          content: { application/json: { schema: { $ref: "#/components/schemas/WsEditResponse" } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/Unprocessable" }

  /v1/workspace/{session_id}/glob:
    parameters: [{ $ref: "#/components/parameters/SessionPathId" }]
    post:
      tags: [Workspace]
      summary: Glob de arquivos
      operationId: workspaceGlob
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/WsGlobRequest" } } }
      responses:
        "200":
          description: OK
          content: { application/json: { schema: { $ref: "#/components/schemas/WsGlobResponse" } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/Unprocessable" }

  /v1/workspace/{session_id}/grep:
    parameters: [{ $ref: "#/components/parameters/SessionPathId" }]
    post:
      tags: [Workspace]
      summary: Grep recursivo
      operationId: workspaceGrep
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/WsGrepRequest" } } }
      responses:
        "200":
          description: OK
          content: { application/json: { schema: { $ref: "#/components/schemas/WsGrepResponse" } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/Unprocessable" }

  /v1/workspace/{session_id}/tree:
    parameters: [{ $ref: "#/components/parameters/SessionPathId" }]
    get:
      tags: [Workspace]
      summary: Árvore de diretórios
      operationId: workspaceTree
      parameters:
        - in: query
          name: depth
          schema: { type: integer, minimum: 1, default: 3 }
      responses:
        "200":
          description: OK
          content: { application/json: { schema: { $ref: "#/components/schemas/WsTreeResponse" } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/workspace/{session_id}/diff:
    parameters: [{ $ref: "#/components/parameters/SessionPathId" }]
    get:
      tags: [Workspace]
      summary: Git diff (do workspace)
      operationId: workspaceDiff
      parameters:
        - in: query
          name: staged
          schema: { type: boolean, default: false }
        - in: query
          name: path
          schema: { type: string }
      responses:
        "200":
          description: OK
          content: { application/json: { schema: { $ref: "#/components/schemas/WsDiffResponse" } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/Unprocessable" }

  # ===================== GIT =====================
  /v1/workspace/{session_id}/git/status:
    parameters: [{ $ref: "#/components/parameters/SessionPathId" }]
    get:
      tags: [Git]
      summary: git status --porcelain
      operationId: gitStatus
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/GitOutput" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "500": { $ref: "#/components/responses/InternalError" }

  /v1/workspace/{session_id}/git/diff:
    parameters: [{ $ref: "#/components/parameters/SessionPathId" }]
    get:
      tags: [Git]
      summary: git diff
      operationId: gitDiff
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/GitOutput" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "500": { $ref: "#/components/responses/InternalError" }

  /v1/workspace/{session_id}/git/log:
    parameters: [{ $ref: "#/components/parameters/SessionPathId" }]
    get:
      tags: [Git]
      summary: git log --oneline -N
      operationId: gitLog
      parameters:
        - in: query
          name: limit
          schema: { type: integer, default: 10 }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/GitOutput" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /v1/workspace/{session_id}/git/branches:
    parameters: [{ $ref: "#/components/parameters/SessionPathId" }]
    get:
      tags: [Git]
      summary: git branch -a
      operationId: gitBranches
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/GitOutput" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /v1/workspace/{session_id}/git/commit:
    parameters: [{ $ref: "#/components/parameters/SessionPathId" }]
    post:
      tags: [Git]
      summary: git commit (stage + commit)
      operationId: gitCommit
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/GitCommitRequest" } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/GitOutput" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "500": { $ref: "#/components/responses/InternalError" }

  /v1/workspace/{session_id}/git/branch/create:
    parameters: [{ $ref: "#/components/parameters/SessionPathId" }]
    post:
      tags: [Git]
      summary: git checkout -b
      operationId: gitBranchCreate
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/GitBranchCreateRequest" } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/GitOutput" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /v1/workspace/{session_id}/git/worktree/create:
    parameters: [{ $ref: "#/components/parameters/SessionPathId" }]
    post:
      tags: [Git]
      summary: git worktree add
      operationId: gitWorktreeCreate
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/GitWorktreeCreateRequest" } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/GitOutput" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /v1/workspace/{session_id}/git/pr/create:
    parameters: [{ $ref: "#/components/parameters/SessionPathId" }]
    post:
      tags: [Git]
      summary: gh pr create (requer GitHub CLI)
      operationId: gitPrCreate
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/GitPrCreateRequest" } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/GitOutput" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "500": { $ref: "#/components/responses/InternalError" }

  # ===================== CONFIG =====================
  /v1/models:
    get:
      tags: [Config]
      summary: Listar modelos
      operationId: listModels
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/ModelsList" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /v1/providers:
    get:
      tags: [Config]
      summary: Listar provedores
      operationId: listProviders
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/ProvidersList" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /v1/config:
    get:
      tags: [Config]
      summary: Configuração atual
      operationId: getConfig
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/Config" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
    patch:
      tags: [Config]
      summary: Atualizar configuração global
      operationId: patchConfig
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/PatchConfig" } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/GlobalConfig" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "500": { $ref: "#/components/responses/InternalError" }

  /v1/config/sources:
    get:
      tags: [Config]
      summary: Fontes de configuração
      operationId: getConfigSources
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/ConfigSources" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /v1/providers/{id}/test:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string }
    post:
      tags: [Config]
      summary: Testar credenciais de provedor
      operationId: testProvider
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/ProviderTestResult" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /v1/budget:
    get:
      tags: [Config]
      summary: Obter orçamento
      operationId: getBudget
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/Budget" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
    patch:
      tags: [Config]
      summary: Atualizar orçamento
      operationId: patchBudget
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/Budget" } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/Budget" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
