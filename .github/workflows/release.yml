name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]*"

permissions:
  contents: write

jobs:
  # ── Prep: gera changelog para o corpo do release ────────────────────────────
  # README e versão já são atualizados localmente pelo scripts/release.sh
  prep:
    name: Generate changelog
    runs-on: ubuntu-latest
    outputs:
      changelog: ${{ steps.gen.outputs.changelog }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: gen
        env:
          TAG: ${{ github.ref_name }}
        run: |
          PREV=$(git tag --sort=-version:refname | grep -v "^${TAG}$" | head -1 || true)

          if [ -n "$PREV" ]; then
            RAW=$(git log "${PREV}..${TAG}" --pretty=format:"%s" --no-merges 2>/dev/null || true)
          else
            RAW=$(git log "${TAG}" --pretty=format:"%s" --no-merges --max-count=20 2>/dev/null || true)
          fi

          FILTERED=$(printf '%s\n' "$RAW" \
            | grep -vE "^(chore: bump version|Merge |docs: atualiza README)" \
            | grep -v "^$" \
            || true)

          CHANGELOG=$(printf '%s\n' "$FILTERED" | sed 's/^/- /' || true)
          [ -z "$CHANGELOG" ] && CHANGELOG="- Maintenance release"

          {
            echo "changelog<<__EOF_CHANGELOG__"
            printf '%s\n' "$CHANGELOG"
            echo "__EOF_CHANGELOG__"
          } >> "$GITHUB_OUTPUT"

  # ── macOS: arm64 + x86_64 ───────────────────────────────────────────────────
  build-macos:
    name: macOS (${{ matrix.target }})
    needs: prep
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            asset: elai-macos-arm64
          - target: x86_64-apple-darwin
            asset: elai-macos-x86_64
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: macos-${{ matrix.target }}-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: macos-${{ matrix.target }}-

      - name: Build
        working-directory: rust
        run: cargo build --release --bin elai --target ${{ matrix.target }}
        env:
          CARGO_TERM_COLOR: always
          GIT_SHA: ${{ github.sha }}

      - name: Rename binary
        run: |
          cp rust/target/${{ matrix.target }}/release/elai ${{ matrix.asset }}
          chmod +x ${{ matrix.asset }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  # ── Linux: x86_64 + arm64 (musl static) ────────────────────────────────────
  build-linux:
    name: Linux (${{ matrix.target }})
    needs: prep
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            asset: elai-linux-x86_64
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-24.04-arm
            asset: elai-linux-arm64
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools
        run: sudo apt-get install -y musl-tools

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: linux-${{ matrix.target }}-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: linux-${{ matrix.target }}-

      - name: Build
        working-directory: rust
        run: cargo build --release --bin elai --target ${{ matrix.target }}
        env:
          CARGO_TERM_COLOR: always
          GIT_SHA: ${{ github.sha }}

      - name: Rename binary
        run: |
          cp rust/target/${{ matrix.target }}/release/elai ${{ matrix.asset }}
          chmod +x ${{ matrix.asset }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  # ── Windows x86_64 ──────────────────────────────────────────────────────────
  build-windows:
    name: Windows (x86_64)
    needs: prep
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: windows-x86_64-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: windows-x86_64-

      - name: Build
        working-directory: rust
        run: cargo build --release --bin elai --target x86_64-pc-windows-msvc
        env:
          CARGO_TERM_COLOR: always
          GIT_SHA: ${{ github.sha }}

      - name: Rename binary
        run: |
          copy rust\target\x86_64-pc-windows-msvc\release\elai.exe elai-windows-x86_64.exe

      - uses: actions/upload-artifact@v4
        with:
          name: elai-windows-x86_64.exe
          path: elai-windows-x86_64.exe

  # ── GitHub Release ──────────────────────────────────────────────────────────
  release:
    name: Create Release
    needs: [prep, build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum elai-macos-arm64 elai-macos-x86_64 \
                    elai-linux-x86_64 elai-linux-arm64 \
                    elai-windows-x86_64.exe > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Elai Code ${{ github.ref_name }}"
          body: |
            ## Changelog

            ${{ needs.prep.outputs.changelog }}

            ---

            ## Install

            **macOS / Linux**
            ```sh
            curl -fsSL https://raw.githubusercontent.com/nextlw/elai-code/main/scripts/install.sh | sh
            ```

            **Windows** (PowerShell)
            ```powershell
            irm https://raw.githubusercontent.com/nextlw/elai-code/main/scripts/install.ps1 | iex
            ```

            ## Manual download

            | Platform | File |
            |----------|------|
            | macOS arm64 (M1/M2/M3) | `elai-macos-arm64` |
            | macOS x86_64 | `elai-macos-x86_64` |
            | Linux x86_64 | `elai-linux-x86_64` |
            | Linux arm64 | `elai-linux-arm64` |
            | Windows x86_64 | `elai-windows-x86_64.exe` |

            See `checksums.txt` to verify downloads.
          files: |
            artifacts/elai-macos-arm64
            artifacts/elai-macos-x86_64
            artifacts/elai-linux-x86_64
            artifacts/elai-linux-arm64
            artifacts/elai-windows-x86_64.exe
            artifacts/checksums.txt
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
