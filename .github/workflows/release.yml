name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]*"

permissions:
  contents: write

jobs:
  # ── Prep: gera changelog para o corpo do release ────────────────────────────
  # README e versão já são atualizados localmente pelo scripts/release.sh
  prep:
    name: Generate changelog
    runs-on: ubuntu-latest
    outputs:
      changelog: ${{ steps.gen.outputs.changelog }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: gen
        env:
          TAG: ${{ github.ref_name }}
        run: |
          PREV=$(git tag --sort=-version:refname | grep -v "^${TAG}$" | head -1 || true)

          if [ -n "$PREV" ]; then
            RAW=$(git log "${PREV}..${TAG}" --pretty=format:"%s" --no-merges 2>/dev/null || true)
          else
            RAW=$(git log "${TAG}" --pretty=format:"%s" --no-merges --max-count=20 2>/dev/null || true)
          fi

          FILTERED=$(printf '%s\n' "$RAW" \
            | grep -vE "^(chore: bump version|Merge |docs: atualiza README)" \
            | grep -v "^$" \
            || true)

          CHANGELOG=$(printf '%s\n' "$FILTERED" | sed 's/^/- /' || true)
          [ -z "$CHANGELOG" ] && CHANGELOG="- Maintenance release"

          {
            echo "changelog<<__EOF_CHANGELOG__"
            printf '%s\n' "$CHANGELOG"
            echo "__EOF_CHANGELOG__"
          } >> "$GITHUB_OUTPUT"

  # ── macOS: arm64 + x86_64 ───────────────────────────────────────────────────
  build-macos:
    name: macOS (${{ matrix.target }})
    needs: prep
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            asset: elai-macos-arm64
            cargo_features: ""
          - target: x86_64-apple-darwin
            asset: elai-macos-x86_64
            # ort 2.0.0-rc.12 não tem prebuilt para esse target via xcframework.
            # Buildamos sem embed-fastembed (--embed-provider local fica off).
            cargo_features: "--no-default-features"
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: macos-${{ matrix.target }}-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: macos-${{ matrix.target }}-

      - name: Build
        working-directory: rust
        run: cargo build --release --bin elai --target ${{ matrix.target }} ${{ matrix.cargo_features }}
        env:
          CARGO_TERM_COLOR: always
          GIT_SHA: ${{ github.sha }}

      - name: Rename binary
        run: |
          cp rust/target/${{ matrix.target }}/release/elai ${{ matrix.asset }}
          chmod +x ${{ matrix.asset }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  # ── Linux: x86_64 + arm64 (musl static) ────────────────────────────────────
  build-linux:
    name: Linux (${{ matrix.target }})
    needs: prep
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            asset: elai-linux-x86_64
            # ort não distribui prebuilt para musl. Buildamos sem
            # embed-fastembed (--embed-provider local fica off neste binário).
            cargo_features: "--no-default-features"
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-24.04-arm
            asset: elai-linux-arm64
            # ort não distribui prebuilt para aarch64-musl. Buildamos sem
            # embed-fastembed (--embed-provider local fica off neste binário).
            cargo_features: "--no-default-features"
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools
        run: sudo apt-get install -y musl-tools

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: linux-${{ matrix.target }}-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: linux-${{ matrix.target }}-

      - name: Build
        working-directory: rust
        run: cargo build --release --bin elai --target ${{ matrix.target }} ${{ matrix.cargo_features }}
        env:
          CARGO_TERM_COLOR: always
          GIT_SHA: ${{ github.sha }}

      - name: Rename binary
        run: |
          cp rust/target/${{ matrix.target }}/release/elai ${{ matrix.asset }}
          chmod +x ${{ matrix.asset }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  # ── Windows x86_64 ──────────────────────────────────────────────────────────
  build-windows:
    name: Windows (x86_64)
    needs: prep
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: windows-x86_64-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: windows-x86_64-

      - name: Build
        working-directory: rust
        run: cargo build --release --bin elai --target x86_64-pc-windows-msvc
        env:
          CARGO_TERM_COLOR: always
          GIT_SHA: ${{ github.sha }}

      - name: Rename binary
        run: |
          copy rust\target\x86_64-pc-windows-msvc\release\elai.exe elai-windows-x86_64.exe

      - uses: actions/upload-artifact@v4
        with:
          name: elai-windows-x86_64.exe
          path: elai-windows-x86_64.exe

  # ── GitHub Release ──────────────────────────────────────────────────────────
  release:
    name: Create Release
    needs: [prep, build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum elai-macos-arm64 elai-macos-x86_64 \
                    elai-linux-x86_64 elai-linux-arm64 \
                    elai-windows-x86_64.exe > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Elai Code ${{ github.ref_name }}"
          body: |
            ## Changelog

            ${{ needs.prep.outputs.changelog }}

            ---

            ## Install

            **macOS / Linux**
            ```sh
            curl -fsSL https://raw.githubusercontent.com/nextlw/elai-code/main/scripts/install.sh | sh
            ```

            **Windows** (PowerShell)
            ```powershell
            irm https://raw.githubusercontent.com/nextlw/elai-code/main/scripts/install.ps1 | iex
            ```

            ## Manual download

            | Platform | File |
            |----------|------|
            | macOS arm64 (M1/M2/M3) | `elai-macos-arm64` |
            | macOS x86_64 | `elai-macos-x86_64` |
            | Linux x86_64 | `elai-linux-x86_64` |
            | Linux arm64 | `elai-linux-arm64` |
            | Windows x86_64 | `elai-windows-x86_64.exe` |

            See `checksums.txt` to verify downloads.
          files: |
            artifacts/elai-macos-arm64
            artifacts/elai-macos-x86_64
            artifacts/elai-linux-x86_64
            artifacts/elai-linux-arm64
            artifacts/elai-windows-x86_64.exe
            artifacts/checksums.txt
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

  # ── Atualiza homebrew-elai (Formula) e scoop bucket ──────────────────────────
  update-formula:
    name: Update Homebrew formula + Scoop bucket
    needs: [release]
    runs-on: ubuntu-latest
    steps:
      - name: Download checksums
        env:
          TAG: ${{ github.ref_name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "$TAG" \
            --repo nextlw/elai-code \
            --pattern checksums.txt \
            --output checksums.txt
          cat checksums.txt

      # ── Homebrew: push para nextlw/homebrew-elai ──────────────────────────
      - name: Checkout homebrew-elai
        uses: actions/checkout@v4
        with:
          repository: nextlw/homebrew-elai
          token: ${{ secrets.NEXCODE_TOKEN }}
          path: homebrew-elai

      - name: Update Formula/elai.rb
        env:
          TAG: ${{ github.ref_name }}
        run: |
          VERSION="${TAG#v}"
          SHA_MACOS_ARM64=$(grep "elai-macos-arm64$"  checksums.txt | awk '{print $1}')
          SHA_MACOS_X86=$(grep   "elai-macos-x86_64$" checksums.txt | awk '{print $1}')
          SHA_LINUX_ARM64=$(grep "elai-linux-arm64$"  checksums.txt | awk '{print $1}')
          SHA_LINUX_X86=$(grep   "elai-linux-x86_64$" checksums.txt | awk '{print $1}')

          mkdir -p homebrew-elai/Formula

          python3 - "$VERSION" "$SHA_MACOS_ARM64" "$SHA_MACOS_X86" "$SHA_LINUX_ARM64" "$SHA_LINUX_X86" <<'PYEOF'
          import sys
          version, sha_mac_arm, sha_mac_x86, sha_linux_arm, sha_linux_x86 = sys.argv[1:]
          formula = f"""class Elai < Formula
            desc "CLI de agente de IA"
            homepage "https://github.com/nextlw/elai-code"
            version "{version}"
            license "MIT"

            on_macos do
              on_arm do
                url "https://github.com/nextlw/elai-code/releases/download/v\#{version}/elai-macos-arm64"
                sha256 "{sha_mac_arm}"
              end
              on_intel do
                url "https://github.com/nextlw/elai-code/releases/download/v\#{version}/elai-macos-x86_64"
                sha256 "{sha_mac_x86}"
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/nextlw/elai-code/releases/download/v\#{version}/elai-linux-arm64"
                sha256 "{sha_linux_arm}"
              end
              on_intel do
                url "https://github.com/nextlw/elai-code/releases/download/v\#{version}/elai-linux-x86_64"
                sha256 "{sha_linux_x86}"
              end
            end

            def install
              bin.install Dir["elai-*"].first => "elai"
            end

            test do
              assert_match version.to_s, shell_output("\#{bin}/elai --version")
            end
          end
          """
          with open("homebrew-elai/Formula/elai.rb", "w") as f:
              f.write(formula)
          PYEOF

      - name: Commit + push homebrew-elai
        env:
          TAG: ${{ github.ref_name }}
        run: |
          cd homebrew-elai
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/elai.rb
          git diff --staged --quiet || git commit -m "chore: update formula to ${TAG}"
          git push origin main

      # ── Scoop: atualiza bucket/elai.json no próprio elai-code ─────────────
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
          path: elai-code

      - name: Update bucket/elai.json
        env:
          TAG: ${{ github.ref_name }}
        run: |
          VERSION="${TAG#v}"
          SHA_WIN=$(grep "elai-windows-x86_64.exe$" checksums.txt | awk '{print $1}')

          python3 - <<PYEOF
import json
version = "${VERSION}"
sha     = "${SHA_WIN}"
path    = "elai-code/bucket/elai.json"
with open(path) as f:
    m = json.load(f)
m["version"] = version
m["architecture"]["64bit"]["url"] = (
    f"https://github.com/nextlw/elai-code/releases/download/v{version}/elai-windows-x86_64.exe"
)
m["architecture"]["64bit"]["hash"] = sha
with open(path, "w") as f:
    json.dump(m, f, indent=2)
    f.write("\n")
PYEOF

      - name: Commit + push elai-code (scoop bucket)
        env:
          TAG: ${{ github.ref_name }}
        run: |
          cd elai-code
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bucket/elai.json
          git diff --staged --quiet || git commit -m "chore: update scoop bucket to ${TAG}"
          git push origin main
